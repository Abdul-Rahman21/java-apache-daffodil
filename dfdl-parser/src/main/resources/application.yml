server:
  port: 8080

spring:
  application:
    name: dfdl-parser
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

daffodil:
  schema: ${DAFFODIL_SCHEMA:/app/schema/CYO_SMPREQ.xsd}
  samples-dir: ${DAFFODIL_SAMPLES_DIR:/app/samples}
  channel-id: ${DAFFODIL_CHANNEL_ID:4101}
  default-channel-name: ${DAFFODIL_CHANNEL_NAME:1A}
  default-currency-code: ${DAFFODIL_CURRENCY:USD}
  default-class-of-service: ${DAFFODIL_CLASS_OF_SERVICE:Y}
  default-pricing: ${DAFFODIL_PRICING:true}

logging:
  level:
    root: INFO
    com.example.dfdl: DEBUG
    org.apache.daffodil: INFO
